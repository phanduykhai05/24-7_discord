name: "Keepalive Heartbeat"

# GitHub tự tắt scheduled workflow nếu repo không có hoạt động trong 60 ngày.
# Workflow này commit 1 "nhịp tim" mỗi tuần để giữ lịch presence luôn bật.
on:
  schedule:
    - cron: "0 3 * * 1" # 03:00 UTC mỗi thứ Hai
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 💓 Write heartbeat and commit
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .heartbeat
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .heartbeat
          git commit -m "chore: keepalive heartbeat [skip ci]" || echo "No changes to commit"
          git push
