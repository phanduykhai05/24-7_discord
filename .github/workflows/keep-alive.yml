name: "24/7 Rich Presence"

on:
  schedule:
    # 4 khung giờ × 6 tiếng = 24/7 không gián đoạn
    # Mỗi job chạy 360 phút (max GitHub free tier)
    - cron: "0 0 * * *"   # 00:00 UTC → 06:00 UTC
    - cron: "0 6 * * *"   # 06:00 UTC → 12:00 UTC
    - cron: "0 12 * * *"  # 12:00 UTC → 18:00 UTC
    - cron: "0 18 * * *"  # 18:00 UTC → 00:00 UTC
  workflow_dispatch:

jobs:
  rich-presence:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Max 6 giờ - GitHub free tier

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🚀 Run Rich Presence Bot (24/7)
        env:
          TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: node index.js
