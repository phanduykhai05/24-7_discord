name: "24/7 Rich Presence"

on:
  schedule:
    # Chạy MỖI 4 TIẾNG, mỗi job kéo dài 5 tiếng (300 phút).
    # Overlap ~1 tiếng để bù độ trễ/skip thường gặp của GitHub cron
    # → không còn khoảng trống 24/7.
    - cron: "0 0 * * *"    # 00:00 UTC
    - cron: "0 4 * * *"    # 04:00 UTC
    - cron: "0 8 * * *"    # 08:00 UTC
    - cron: "0 12 * * *"   # 12:00 UTC
    - cron: "0 16 * * *"   # 16:00 UTC
    - cron: "0 20 * * *"   # 20:00 UTC
  workflow_dispatch:

jobs:
  rich-presence:
    runs-on: ubuntu-latest
    timeout-minutes: 300 # 5 giờ (< max 6h), tạo overlap với job kế tiếp

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🚀 Run Rich Presence Bot (24/7)
        env:
          TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: node index.js
